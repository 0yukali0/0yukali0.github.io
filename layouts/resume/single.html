<style>
.resume-contact {
  display: flex;
  gap: 1.5em;
  flex-wrap: wrap;
  margin-bottom: 1em;
  font-size: 0.95em;
}
.resume-contact a {
  text-decoration: none;
  color: inherit;
}
.resume-contact a:hover {
  text-decoration: underline;
}
.resume-download {
  margin-bottom: 1.5em;
}
.resume-download button {
  padding: 0.4em 1em;
  font-size: 0.9em;
  cursor: pointer;
  border: 1px solid #888;
  background: #f5f5f5;
  border-radius: 3px;
}
.resume-download button:hover {
  background: #e8e8e8;
}
@media print {
  nav, .resume-download {
    display: none !important;
  }
  body {
    font-size: 11pt;
  }
}
</style>

</div>
